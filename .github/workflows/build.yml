name: Android APK Build Engine
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle Engine
        uses: gradle/actions/setup-gradle@v3

      - name: Initialize Android Project Files
        run: |
          # 1. Create root build.gradle with proper Android repositories
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          # 2. Create settings.gradle
          echo "include ':app'" > settings.gradle

          # 3. Create app/build.gradle with Android structural rules
          mkdir -p app
          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.pureblock.lightweight'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.pureblock.lightweight'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          EOF

      - name: Build Debug APK via Gradle Cloud Machine
        run: gradle assembleDebug

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: PureBlock-Engine
          path: app/build/outputs/apk/debug/app-debug.apk
