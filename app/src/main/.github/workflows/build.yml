name: Android APK Build Engine
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: Initialize Android Project Files
        run: |
          echo "include ':app'" > settings.gradle
          mkdir -p app
          echo "apply plugin: 'com.android.application'" > app/build.gradle
          echo "android { compileSdkVersion 34; defaultConfig { applicationId 'com.pureblock.lightweight'; minSdkVersion 26; targetSdkVersion 34; versionCode 1; versionName '1.0' } }" >> app/build.gradle
      - name: Build Debug APK via Gradle Cloud Machine
        run: bash ./gradlew assembleDebug
      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: PureBlock-Engine
          path: app/build/outputs/apk/debug/app-debug.apk
